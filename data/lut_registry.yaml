# MoodLab LUT Registry — single source of truth for .cube generation and catalog metadata.
# Edit this file, then: pnpm lut:generate → pnpm lut:validate → pnpm lut:sync-catalog

packs:
  - id: sunny-starts
    name: Sunny Starts
    description: Warm, bright moods for portraits and daytime posts.
    categories: [Sunny, Portrait]
    plan: free
    coverColor: "#F5B85B"
  - id: dark-cinematic
    name: Dark Cinematic
    description: Moody blues, purple nights, and cover-art darkness.
    categories: [Dark, Music Cover, Cinematic]
    plan: free
    coverColor: "#3D4F7C"
  - id: melanin-gold
    name: Melanin Gold
    description: Skin-safe warmth for brown and deep skin tones.
    categories: [Portrait, Luxury]
    plan: pro
    coverColor: "#C4923A"
  - id: creator-cover
    name: Creator Cover
    description: Beat covers, rollout posts, and thumbnail-ready grades.
    categories: [Music Cover, Viral, Streetwear]
    plan: pro
    coverColor: "#FF7A33"

luts:
  - id: sunny-cover-glow
    name: Sunny Cover Glow
    packId: sunny-starts
    categories: [Sunny, Portrait, Music Cover]
    plan: free
    tags: [sunny, cover, warm]
    grade:
      type: warm_glow
      params: { warmth: 0.12, lift: 0.04, saturation: 0.08 }
    metadata:
      defaultStrength: 0.78
      skinProtectionDefault: medium
      recommendedEffects: { grain: 0.12, glow: 0.18, vignette: 0.1 }

  - id: afrobeat-warm-cover
