# Filter & Camera Preset Taxonomy — ~1000 presets
# Tier 2 catalog (film stocks, camera profiles, cinema, specialty)
# Implements as .cube via filter_registry.yaml (Phase 2) — same lut-studio pipeline

target: 1000
current: 0
kind: filter_preset

naming:
  idFormat: kebab-case-manufacturer-stock
  displayName: "Manufacturer Stock ISO" or camera profile name
  examples:
    - "Kodak Portra 400"
    - "Fuji Classic Chrome"
    - "Canon Neutral Profile"

metadataFields:
  - kind              # filter_preset | mood_lut
  - manufacturer
  - stock
  - iso
  - format            # 35mm | 120 | instant | digital | cinema
  - character         # tags: warm, cool, portrait, landscape, high-contrast
  - skinProtectionDefault
  - recommendedEffects

families:
  - id: kodak
    name: Kodak
    targetCount: 120
    stocks:
      colorPortrait:
        - { stock: Portra 160, variants: [over, normal, under, push-1] }
        - { stock: Portra 400, variants: [over, normal, under, push-1, push-2] }
        - { stock: Portra 800, variants: [over, normal, under, push-1] }
        - { stock: Ektar 100, variants: [normal, over] }
        - { stock: Gold 200, variants: [normal, over, under] }
        - { stock: ColorPlus 200, variants: [normal] }
        - { stock: Ultramax 400, variants: [normal, over] }
      slide:
        - { stock: Ektachrome E100, variants: [normal, over] }
        - { stock: Elite Chrome 100, variants: [normal] }
      bw:
        - { stock: Tri-X 400, variants: [normal, push-1, push-2] }
        - { stock: T-Max 100, variants: [normal] }
        - { stock: T-Max 400, variants: [normal, push-1] }
        - { stock: Plus-X 125, variants: [normal] }
      cinema:
        - { stock: Vision3 50D, variants: [normal, over] }
        - { stock: Vision3 250D, variants: [normal] }
        - { stock: Vision3 500T, variants: [normal, push-1, push-2] }
        - { stock: Vision3 200T, variants: [normal] }
        - { stock: Double-X 5222, variants: [normal, push-1] }

  - id: fuji
    name: Fuji
    targetCount: 120
    stocks:
      colorNegative:
        - { stock: Pro 400H, variants: [normal, over, under] }
        - { stock: Pro 160NS, variants: [normal] }
        - { stock: Superia 400, variants: [normal, over] }
        - { stock: Superia 800, variants: [normal] }
        - { stock: C200, variants: [normal, over] }
      slide:
