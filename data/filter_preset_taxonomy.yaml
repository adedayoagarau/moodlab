        - { stock: Velvia 100, variants: [normal] }
        - { stock: Provia 100F, variants: [normal, over] }
        - { stock: Astia 100F, variants: [normal] }
      bw:
        - { stock: Acros 100 II, variants: [normal, push-1] }
        - { stock: Neopan 400, variants: [normal] }
      digitalSim:
        - { stock: Classic Chrome, variants: [weak, strong] }
        - { stock: Classic Neg, variants: [weak, strong] }
        - { stock: Nostalgic Neg, variants: [normal] }
        - { stock: Eterna, variants: [normal, cinema] }
