batchPlanning:
  phase1_moodLuts: 100
  phase2_filterPresets: 1000
  batchSize: 20
  batchesTo1000: 50
  recipeStrategy:
    filmStock: film_stock_emulation   # new recipe — Phase 2
    cameraProfile: camera_profile     # new recipe — Phase 2
    specialty: parametric from specialty types

loopIntegration:
  stateFile: .cursor/loop/state.json
  loopPrompt: .cursor/loop/catalog-expansion.md
  subagent: lut-developer
